- date: 8 April 2026
  headline: |
    Joint laboratory established!

    Tongji University and the Chinese University of Hong Kong (CUHK) have officially established the **Joint Laboratory of Smart Transportation**.

    同济大学与香港中文大学正式成立“**智慧交通联合实验室**”。揭牌仪式在同济大学成功举行。

