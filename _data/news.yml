- date: 10 July 2026
  headline: |
    Congratulations! Xinkun Wang's paper "Efficient Thrust Vector Allocation for Tilt-Rotor Aerial-Aquatic Vehicle Using Null-Space Parameterized Optimization" has been accepted by **IEEE/RSJ IROS 2026**!

    恭喜王歆坤的论文 “Efficient Thrust Vector Allocation for Tilt-Rotor Aerial-Aquatic Vehicle Using Null-Space Parameterized Optimization” 被 **IEEE/RSJ IROS 2026** 录用！

