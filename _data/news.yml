- date: 16 April 2026
  headline: |
    TJ-FlyingFish first sea trial!

    The TJ-FlyingFish hybrid aerial-aquatic vehicle successfully completed its first-ever sea trial in Weihai, Shandong.

    同济飞鱼水空跨介质飞行器在山东威海成功完成了首次海试！

