<div class="well">
<h4>News</h4>

<div class="news-scroll-container">
  <div class="news-timeline">
    {% for article in site.data.news limit:5 %}
    <div class="news-timeline-item">
      <div class="news-timeline-badge"></div>
      <div class="news-timeline-content">
        <span class="news-date">{{ article.date }}</span>
        <div class="news-headline">{{ article.headline | markdownify }}</div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>

<h4 style="margin-top: 20px;"><a href="{{ site.url }}{{ site.baseurl }}/allnews.html">... see all News</a></h4>
</div>
